<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" fill="none">
  <!-- "go" text -->
  <text x="8" y="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="88" fill="white" letter-spacing="-2">go</text>

  <!-- "7" outline shape -->
  <text x="168" y="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="88" fill="white" opacity="0.15" letter-spacing="0">7</text>

  <!-- Horizontal stripe mask over "7" -->
  <clipPath id="sevenClip">
    <text x="168" y="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="88">7</text>
  </clipPath>
  <g clip-path="url(#sevenClip)">
    <rect x="165" y="4"  width="90" height="6" fill="white"/>
    <rect x="165" y="16" width="90" height="6" fill="white"/>
    <rect x="165" y="28" width="90" height="6" fill="white"/>
    <rect x="165" y="40" width="90" height="6" fill="white"/>
    <rect x="165" y="52" width="90" height="6" fill="white"/>
    <rect x="165" y="64" width="90" height="6" fill="white"/>
    <rect x="165" y="76" width="90" height="6" fill="white"/>
    <rect x="165" y="88" width="90" height="6" fill="white"/>
  </g>

  <!-- Divider line -->
  <line x1="8" y1="100" x2="252" y2="100" stroke="white" stroke-width="1.2" opacity="0.7"/>

  <!-- Tagline -->
  <text x="8" y="115" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="white" letter-spacing="4" opacity="0.9">SEVEN SHADES OF</text>
  <text x="182" y="115" font-family="Georgia, serif" font-size="13" font-style="italic" fill="white" letter-spacing="0.5" opacity="0.95">Confidence</text>
</svg>
